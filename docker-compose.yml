version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: aplis-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aplis_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backendphp:
    build: ./backendphp
    container_name: aplis-backendphp
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: aplis_db

  backendjs:
    build: ./backendjs
    container_name: aplis-backendjs
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: aplis_db

  frontend:
    build: ./app
    container_name: aplis-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backendphp
      - backendjs

volumes:
  mysql_data: